<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>FIT TRACKER</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#f7f8fc;--card:#fff;--text:#1a1d2e;--muted:#9499b5;--border:#e8eaf2;
  --green:#22c55e;--red:#ef4444;--blue:#3b82f6;--indigo:#4f46e5;--amber:#f59e0b;
  --shadow:0 2px 12px rgba(0,0,0,0.07);
}
body{background:var(--bg);font-family:'Nunito',sans-serif;color:var(--text);
  min-height:100vh;padding:16px 16px 100px;max-width:480px;margin:0 auto;}
 
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;padding-top:4px;}
.header-title{font-size:22px;font-weight:900;}
.header-date{font-size:11px;color:var(--muted);font-weight:700;text-align:right;line-height:1.6;}
 
.tabs{display:flex;gap:6px;margin-bottom:18px;background:var(--card);padding:5px;
  border-radius:14px;box-shadow:var(--shadow);}
.tab{flex:1;padding:9px 4px;border:none;border-radius:10px;background:transparent;
  font-family:'Nunito',sans-serif;font-size:12px;font-weight:700;color:var(--muted);
  cursor:pointer;transition:all 0.2s;}
.tab.active{background:var(--indigo);color:#fff;box-shadow:0 2px 8px rgba(79,70,229,0.3);}
 
.section{display:none;animation:fadeUp 0.2s ease;}
.section.active{display:block;}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
 
.card{background:var(--card);border-radius:18px;padding:18px;margin-bottom:12px;box-shadow:var(--shadow);}
.card-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;
  color:var(--muted);margin-bottom:10px;}
 
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
.stat-card{background:var(--card);border-radius:16px;padding:14px;box-shadow:var(--shadow);text-align:center;}
.stat-val{font-size:26px;font-weight:900;line-height:1;margin-bottom:3px;}
.stat-lbl{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;}
 
.ring-wrap{display:flex;justify-content:center;margin:4px 0 14px;position:relative;}
.ring-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;}
.ring-pct{font-size:28px;font-weight:900;}
.ring-sub{font-size:10px;color:var(--muted);font-weight:700;}
 
.slider-header{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px;}
.slider-val{font-size:32px;font-weight:900;line-height:1;}
.slider-unit{font-size:13px;color:var(--muted);font-weight:600;}
.slider-goal-txt{font-size:11px;color:var(--indigo);font-weight:700;}
 
input[type=range]{width:100%;height:6px;border-radius:99px;outline:none;
  -webkit-appearance:none;cursor:pointer;background:var(--border);margin-bottom:6px;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:24px;height:24px;
  border-radius:50%;background:var(--indigo);box-shadow:0 2px 8px rgba(79,70,229,0.4);
  cursor:pointer;transition:transform 0.1s;}
input[type=range]:active::-webkit-slider-thumb{transform:scale(1.15);}
.range-labels{display:flex;justify-content:space-between;font-size:10px;color:var(--muted);font-weight:600;}
 
.pbar-wrap{background:var(--border);border-radius:99px;height:7px;overflow:hidden;margin:8px 0;}
.pbar-fill{height:100%;border-radius:99px;transition:width 0.4s cubic-bezier(0.4,0,0.2,1);}
 
.weight-row{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.w-input{flex:1;font-family:'Nunito',sans-serif;font-size:36px;font-weight:900;
  text-align:center;border:2px solid var(--border);border-radius:14px;padding:10px 4px;
  outline:none;background:var(--bg);color:var(--text);-moz-appearance:textfield;
  transition:border-color 0.2s;}
.w-input:focus{border-color:var(--indigo);}
.w-input::-webkit-outer-spin-button,.w-input::-webkit-inner-spin-button{-webkit-appearance:none;}
.adj-col{display:flex;flex-direction:column;gap:6px;}
.adj-btn{width:40px;height:40px;border:1px solid var(--border);border-radius:12px;
  background:var(--bg);font-size:16px;font-weight:800;color:var(--text);cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:background 0.1s;}
.adj-btn:active{background:var(--border);}
 
.toggle-row{display:flex;gap:8px;}
.toggle-btn{flex:1;padding:13px;border:2px solid var(--border);border-radius:14px;
  background:var(--bg);font-family:'Nunito',sans-serif;font-size:14px;font-weight:700;
  color:var(--muted);cursor:pointer;transition:all 0.15s;}
.toggle-btn.yes{border-color:var(--green);background:rgba(34,197,94,0.08);color:var(--green);}
.toggle-btn.no{border-color:var(--red);background:rgba(239,68,68,0.08);color:var(--red);}
 
.rating-row{display:flex;gap:4px;}
.rating-btn{flex:1;padding:10px 2px;border:2px solid var(--border);border-radius:10px;
  background:var(--bg);font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;
  color:var(--muted);cursor:pointer;text-align:center;transition:all 0.15s;}
.rating-btn.sel{background:var(--indigo);border-color:var(--indigo);color:#fff;}
 
.time-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
.time-block label{display:block;font-size:11px;font-weight:700;color:var(--muted);
  text-transform:uppercase;margin-bottom:6px;}
.time-input{width:100%;padding:12px;border:2px solid var(--border);border-radius:14px;
  font-family:'Nunito',sans-serif;font-size:22px;font-weight:900;text-align:center;
  background:var(--bg);color:var(--text);outline:none;transition:border-color 0.2s;}
.time-input:focus{border-color:var(--indigo);}
 
.wakeup-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;}
.wakeup-lbl{font-size:13px;font-weight:700;color:var(--muted);}
.wakeup-ctr{display:flex;align-items:center;gap:14px;}
.wakeup-btn{width:36px;height:36px;border-radius:50%;border:2px solid var(--border);
  background:var(--bg);font-size:18px;font-weight:700;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all 0.1s;}
.wakeup-btn:active{background:var(--border);}
.wakeup-num{font-size:24px;font-weight:900;min-width:28px;text-align:center;}
 
.sleep-score{border-radius:14px;padding:14px 16px;margin-top:10px;
  display:flex;align-items:center;gap:12px;animation:fadeUp 0.2s ease;}
.score-emoji{font-size:26px;}
.score-val{font-size:22px;font-weight:900;line-height:1;}
.score-lbl{font-size:11px;font-weight:700;margin-top:2px;}
.score-desc{font-size:11px;color:var(--muted);margin-top:4px;line-height:1.4;}
 
.btn-main{width:100%;padding:16px;border:none;border-radius:16px;background:var(--indigo);
  color:#fff;font-family:'Nunito',sans-serif;font-size:16px;font-weight:800;cursor:pointer;
  box-shadow:0 4px 14px rgba(79,70,229,0.35);transition:opacity 0.15s,transform 0.1s;margin-top:4px;}
.btn-main:active{transform:scale(0.98);opacity:0.9;}
 
.cal-grid-wrap{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
.cal-dow{text-align:center;font-size:10px;font-weight:700;color:var(--muted);padding:4px 0;}
.cal-cell{aspect-ratio:1;border-radius:10px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;font-size:11px;font-weight:700;
  border:2px solid transparent;position:relative;}
.cal-cell.has{background:#f0fdf4;border-color:#bbf7d0;color:var(--green);}
.cal-cell.miss{background:#fef2f2;border-color:#fecaca;color:var(--red);}
.cal-cell.today{border-color:var(--indigo);background:rgba(79,70,229,0.06);color:var(--indigo);}
.cal-cell.future{opacity:0.3;background:var(--bg);}
.cal-cell.goal{background:#fffbeb;border-color:#fcd34d;color:var(--amber);}
.cal-dot{font-size:8px;}
 
.hist-item{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid var(--border);}
.hist-item:last-child{border:none;}
.hist-date{font-size:12px;color:var(--muted);font-weight:700;min-width:38px;}
.hist-tags{display:flex;gap:6px;flex-wrap:wrap;}
.tag{font-size:11px;font-weight:700;padding:3px 8px;border-radius:8px;}
 
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(10px);
  background:var(--text);color:#fff;padding:12px 22px;border-radius:99px;
  font-size:13px;font-weight:700;opacity:0;pointer-events:none;transition:all 0.25s;
  z-index:999;white-space:nowrap;box-shadow:0 4px 16px rgba(0,0,0,0.2);}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.ok{background:var(--green);}
</style>
</head>
<body>
 
<div class="header">
  <div class="header-title">🔥 FIT</div>
  <div class="header-date" id="hdr-date">—</div>
</div>
 
<div class="tabs">
  <button class="tab active" onclick="setTab('home',this)">🏠 Главная</button>
  <button class="tab" onclick="setTab('checkin',this)">✅ Чек-ин</button>
  <button class="tab" onclick="setTab('sleep',this)">🌙 Сон</button>
  <button class="tab" onclick="setTab('cal',this)">📅 Дни</button>
</div>
 
<!-- HOME -->
<div class="section active" id="sec-home">
  <div class="stat-grid">
    <div class="stat-card"><div class="stat-val" id="h-w" style="color:var(--indigo)">—</div><div class="stat-lbl">Вес кг</div></div>
    <div class="stat-card"><div class="stat-val" id="h-dl" style="color:var(--amber)">—</div><div class="stat-lbl">Дней до цели</div></div>
  </div>
  <div class="stat-grid">
    <div class="stat-card"><div class="stat-val" id="h-lost" style="color:var(--green)">—</div><div class="stat-lbl">Сброшено кг</div></div>
    <div class="stat-card"><div class="stat-val" id="h-strk" style="color:var(--red)">—</div><div class="stat-lbl">Стрик 🔥</div></div>
  </div>
 
  <div class="card">
    <div class="card-label">Прогресс к цели</div>
    <div class="ring-wrap">
      <svg width="130" height="130" viewBox="0 0 130 130">
        <circle cx="65" cy="65" r="52" fill="none" stroke="#e8eaf2" stroke-width="12"/>
        <circle cx="65" cy="65" r="52" fill="none" stroke="url(#g1)" stroke-width="12"
          stroke-linecap="round" stroke-dasharray="327" id="ring-arc"
          stroke-dashoffset="327" transform="rotate(-90 65 65)" style="transition:stroke-dashoffset 0.8s ease"/>
        <defs><linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="#4f46e5"/><stop offset="100%" stop-color="#22c55e"/>
        </linearGradient></defs>
      </svg>
      <div class="ring-center">
        <div class="ring-pct" id="ring-pct">0%</div>
        <div class="ring-sub">к цели</div>
      </div>
    </div>
    <div style="display:flex;justify-content:space-between;font-size:11px;font-weight:700;color:var(--muted);margin-bottom:4px;">
      <span>Время</span><span id="time-pct">0%</span>
    </div>
    <div class="pbar-wrap"><div class="pbar-fill" id="time-bar" style="width:0%;background:linear-gradient(90deg,#4f46e5,#8b5cf6)"></div></div>
  </div>
 
  <div class="card">
    <div class="card-label">Сегодня</div>
    <div id="today-pills" style="display:grid;grid-template-columns:1fr 1fr;gap:8px;"></div>
  </div>
 
  <div class="card">
    <div class="card-label">Шаги сегодня</div>
    <div class="slider-header">
      <div><div class="slider-val" id="steps-disp">0</div><div class="slider-unit">шагов</div></div>
      <div class="slider-goal-txt" id="steps-goal-lbl">цель: 10 000</div>
    </div>
    <div class="pbar-wrap"><div class="pbar-fill" id="steps-pbar" style="width:0%;background:var(--blue)"></div></div>
    <input type="range" id="steps-sl" min="0" max="30000" step="100" value="0" oninput="onSteps(this.value)">
    <div class="range-labels"><span>0</span><span>10к</span><span>20к</span><span>30к</span></div>
    <button class="btn-main" style="margin-top:10px;" onclick="saveSteps()">💾 Сохранить шаги</button>
  </div>
</div>
 
<!-- CHECKIN -->
<div class="section" id="sec-checkin">
  <div class="card">
    <div class="card-label">Вес сегодня</div>
    <div class="weight-row">
      <div class="adj-col">
        <button class="adj-btn" onclick="adjW(-1)">−</button>
        <button class="adj-btn" onclick="adjW(-0.1)" style="font-size:11px;">−.1</button>
      </div>
      <input type="number" id="w-inp" class="w-input" step="0.1" min="30" max="300" placeholder="76.0" oninput="onWInp()">
      <div class="adj-col">
        <button class="adj-btn" onclick="adjW(1)">+</button>
        <button class="adj-btn" onclick="adjW(0.1)" style="font-size:11px;">+.1</button>
      </div>
    </div>
    <div id="w-diff" style="text-align:center;font-size:13px;font-weight:700;color:var(--muted);min-height:18px;"></div>
  </div>
 
  <div class="card">
    <div class="card-label">Тренировка</div>
    <div class="toggle-row">
      <button class="toggle-btn" id="wo-y" onclick="setWO(true)">💪 Да</button>
      <button class="toggle-btn" id="wo-n" onclick="setWO(false)">😴 Нет</button>
    </div>
  </div>
 
  <div class="card">
    <div class="card-label">Оценка дня</div>
    <div class="rating-row" id="rating-row"></div>
  </div>
 
  <button class="btn-main" onclick="saveCheckin()">✅ Сохранить чек-ин</button>
</div>
 
<!-- SLEEP -->
<div class="section" id="sec-sleep">
  <div class="card">
    <div class="card-label">Сон</div>
    <div class="time-grid">
      <div class="time-block"><label>Лёг спать</label>
        <input type="time" id="sl-start" class="time-input" value="23:00" oninput="onSleep()"></div>
      <div class="time-block"><label>Проснулся</label>
        <input type="time" id="sl-end" class="time-input" value="07:00" oninput="onSleep()"></div>
    </div>
    <div class="pbar-wrap"><div class="pbar-fill" id="sl-pbar" style="width:0%;background:var(--indigo)"></div></div>
    <div style="display:flex;justify-content:space-between;font-size:11px;font-weight:700;color:var(--muted);margin-top:2px;">
      <span id="sl-hrs">—</span><span>Норма: 7–9 ч</span>
    </div>
    <div class="wakeup-row">
      <div class="wakeup-lbl">Просыпался ночью:</div>
      <div class="wakeup-ctr">
        <button class="wakeup-btn" onclick="adjWU(-1)">−</button>
        <div class="wakeup-num" id="wu-num">0</div>
        <button class="wakeup-btn" onclick="adjWU(1)">+</button>
      </div>
    </div>
    <div id="sl-score"></div>
  </div>
  <button class="btn-main" onclick="saveSleep()">🌙 Сохранить сон</button>
 
  <div class="card" style="margin-top:12px;">
    <div class="card-label">История сна</div>
    <div id="sl-hist"></div>
  </div>
</div>
 
<!-- CALENDAR -->
<div class="section" id="sec-cal">
  <div class="card">
    <div class="card-label">Апрель — Май 2026</div>
    <div class="cal-grid-wrap" id="cal-dows"></div>
    <div style="height:5px;"></div>
    <div class="cal-grid-wrap" id="cal-cells"></div>
    <div style="display:flex;gap:12px;margin-top:10px;font-size:10px;font-weight:700;color:var(--muted);">
      <span style="color:var(--green)">✅ вес есть</span>
      <span style="color:var(--red)">❌ нет</span>
      <span style="color:var(--amber)">🎯 цель</span>
    </div>
  </div>
  <div class="card">
    <div class="card-label">Последние 7 дней</div>
    <div id="hist-list"></div>
  </div>
</div>
 
<div class="toast" id="toast"></div>
 
<script>
const tg = window.Telegram?.WebApp;
if(tg){ tg.ready(); tg.expand(); }
 
// ── Storage ──────────────────────────────────────────────────────
const S = {
  get:(k,d=null)=>{ try{const v=localStorage.getItem('ft_'+k);return v!=null?JSON.parse(v):d;}catch{return d;} },
  set:(k,v)=>{ try{localStorage.setItem('ft_'+k,JSON.stringify(v));}catch{} }
};
 
// ── Defaults ─────────────────────────────────────────────────────
if(!S.get('cfg')){
  S.set('cfg',{sw:85,tw:73,stepsGoal:10000,goal:'lose',
    setupDate:'2026-04-21',goalDate:'2026-05-27'});
}
 
// ── Time (Istanbul) ───────────────────────────────────────────────
function nowIST(){ return new Date(new Date().toLocaleString('en-US',{timeZone:'Europe/Istanbul'})); }
function todayStr(){
  const d=nowIST();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function fmtDate(ds){
  const d=new Date(ds); const ms=['янв','фев','мар','апр','май','июн','июл','авг','сен','окт','ноя','дек'];
  return `${d.getDate()} ${ms[d.getMonth()]}`;
}
function dLabel(ds){
  const t=todayStr();
  const y=new Date(nowIST()-86400000);
  const ys=`${y.getFullYear()}-${String(y.getMonth()+1).padStart(2,'0')}-${String(y.getDate()).padStart(2,'0')}`;
  return ds===t?'Сегодня':ds===ys?'Вчера':fmtDate(ds);
}
 
// ── State ─────────────────────────────────────────────────────────
let wakeups=0,workout=null,rating=5;
 
// ── Boot ──────────────────────────────────────────────────────────
window.addEventListener('load',()=>{
  updateHdr(); buildRating(); renderHome(); prefillCheckin(); onSleep(); renderSlHist(); renderCal(); renderHist();
  setInterval(updateHdr,30000);
});
 
function updateHdr(){
  const d=nowIST();
  const days=['Вс','Пн','Вт','Ср','Чт','Пт','Сб'];
  const ms=['янв','фев','мар','апр','май','июн','июл','авг','сен','окт','ноя','дек'];
  const hh=String(d.getHours()).padStart(2,'0'), mm=String(d.getMinutes()).padStart(2,'0');
  document.getElementById('hdr-date').innerHTML=`${days[d.getDay()]} ${d.getDate()} ${ms[d.getMonth()]}<br>${hh}:${mm}`;
}
 
// ── TABS ──────────────────────────────────────────────────────────
function setTab(name,btn){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  document.getElementById('sec-'+name).classList.add('active');
  btn.classList.add('active');
  if(name==='home') renderHome();
  if(name==='cal'){renderCal();renderHist();}
  if(name==='sleep') renderSlHist();
}
 
// ── HOME ──────────────────────────────────────────────────────────
function renderHome(){
  const cfg=S.get('cfg',{}); const days=S.get('days',{}); const td=todayStr();
  const now=nowIST();
  const SETUP=new Date(cfg.setupDate||'2026-04-21');
  const GOAL=new Date(cfg.goalDate||'2026-05-27');
 
  const ws=Object.entries(days).filter(([k,v])=>v?.weight).sort((a,b)=>b[0].localeCompare(a[0]));
  const curW=ws.length?ws[0][1].weight:(cfg.sw||'—');
  const lost=cfg.sw?Math.max(0,+(cfg.sw-curW).toFixed(1)):0;
  const dl=Math.max(0,Math.round((GOAL-now)/86400000));
 
  // Streak
  let strk=0,d=new Date(now);
  const ds0=()=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  if(!days[td]?.weight) d=new Date(d-86400000);
  for(let i=0;i<200;i++){if(days[ds0()]?.weight){strk++;d=new Date(d-86400000);}else break;}
 
  document.getElementById('h-w').textContent=typeof curW==='number'?curW+' кг':'—';
  document.getElementById('h-dl').textContent=dl;
  document.getElementById('h-lost').textContent=lost?'-'+lost+' кг':'—';
  document.getElementById('h-strk').textContent=strk;
 
  // Ring
  const total=Math.abs((cfg.sw||0)-(cfg.tw||0));
  const done=cfg.sw?Math.abs(cfg.sw-curW):0;
  const gPct=total>0?Math.min(100,Math.round(done/total*100)):0;
  document.getElementById('ring-pct').textContent=gPct+'%';
  const C=2*Math.PI*52; // 327
  document.getElementById('ring-arc').style.strokeDashoffset=C*(1-gPct/100);
 
  // Time bar
  const tTotal=Math.round((GOAL-SETUP)/86400000);
  const tDone=Math.round((now-SETUP)/86400000);
  const tPct=Math.min(100,Math.max(0,Math.round(tDone/tTotal*100)));
  document.getElementById('time-pct').textContent=tPct+'%';
  document.getElementById('time-bar').style.width=tPct+'%';
 
  // Today pills
  const day=days[td]||{}; const sl=S.get('sleep',{})[td]||{};
  const pills=[
    {icon:'⚖️',lbl:'Вес',ok:!!day.weight,val:day.weight?day.weight+' кг':'—'},
    {icon:'👟',lbl:'Шаги',ok:day.steps!=null,val:day.steps!=null?Number(day.steps).toLocaleString('ru'):'—'},
    {icon:'💪',lbl:'Трен.',ok:'workout'in day,val:'workout'in day?(day.workout?'Да':'Нет'):'—'},
    {icon:'🌙',lbl:'Сон',ok:!!sl.saved,val:sl.saved?`${Math.floor(sl.hrs)}ч ${Math.round((sl.hrs%1)*60)}м`:'—'},
  ];
  document.getElementById('today-pills').innerHTML=pills.map(p=>`
    <div style="background:${p.ok?'#f0fdf4':'var(--bg)'};border:2px solid ${p.ok?'#bbf7d0':'var(--border)'};border-radius:12px;padding:10px;text-align:center;">
      <div style="font-size:18px;">${p.icon}</div>
      <div style="font-size:13px;font-weight:800;color:${p.ok?'var(--green)':'var(--muted)'};">${p.val}</div>
      <div style="font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;">${p.lbl}</div>
    </div>`).join('');
 
  // Steps slider
  const goal=cfg.stepsGoal||10000;
  const todaySteps=day.steps||0;
  document.getElementById('steps-sl').value=todaySteps;
  document.getElementById('steps-goal-lbl').textContent='цель: '+Number(goal).toLocaleString('ru');
  onSteps(todaySteps);
}
 
function onSteps(v){
  v=parseInt(v);
  document.getElementById('steps-disp').textContent=Number(v).toLocaleString('ru');
  const cfg=S.get('cfg',{}); const goal=cfg.stepsGoal||10000;
  const pct=Math.min(100,(v/goal)*100);
  const bar=document.getElementById('steps-pbar');
  bar.style.width=pct+'%';
  bar.style.background=v>=goal?'var(--green)':v>=goal*.7?'var(--amber)':'var(--blue)';
}
function saveSteps(){
  const v=parseInt(document.getElementById('steps-sl').value);
  const days=S.get('days',{}); const td=todayStr();
  if(!days[td])days[td]={};
  days[td].steps=v; S.set('days',days);
  toast('👟 Шаги сохранены!','ok'); renderHome();
}
 
// ── CHECKIN ───────────────────────────────────────────────────────
function buildRating(){
  const row=document.getElementById('rating-row');
  for(let i=1;i<=10;i++){
    const b=document.createElement('button');
    b.className='rating-btn'+(i===5?' sel':'');
    b.textContent=i; b.id='rb'+i;
    b.onclick=()=>setRating(i); row.appendChild(b);
  }
}
function setRating(v){
  rating=v;
  for(let i=1;i<=10;i++){const b=document.getElementById('rb'+i);if(b)b.className='rating-btn'+(i===v?' sel':'');}
}
function setWO(v){
  workout=v;
  document.getElementById('wo-y').className='toggle-btn'+(v===true?' yes':'');
  document.getElementById('wo-n').className='toggle-btn'+(v===false?' no':'');
}
function adjW(d){
  const inp=document.getElementById('w-inp');
  const cur=parseFloat(inp.value)||(S.get('cfg',{}).sw||75);
  inp.value=Math.round((cur+d)*10)/10; onWInp();
}
function onWInp(){
  const w=parseFloat(document.getElementById('w-inp').value);
  const days=S.get('days',{}); const td=todayStr();
  const prev=Object.entries(days).filter(([k,v])=>k<td&&v?.weight).sort((a,b)=>b[0].localeCompare(a[0]));
  const el=document.getElementById('w-diff');
  if(prev.length&&w){
    const d=Math.round((w-prev[0][1].weight)*10)/10;
    el.textContent=d>0?`+${d} кг ↑`:d<0?`${d} кг ↓`:'Без изменений';
    el.style.color=d<0?'var(--green)':d>0?'var(--red)':'var(--muted)';
  }else el.textContent='';
}
function prefillCheckin(){
  const inp=document.getElementById('w-inp');
  if(!inp.value){
    const days=S.get('days',{});
    const prev=Object.entries(days).filter(([k,v])=>v?.weight).sort((a,b)=>b[0].localeCompare(a[0]));
    if(prev.length) inp.value=prev[0][1].weight;
    else{ const cfg=S.get('cfg',{}); if(cfg.sw) inp.value=cfg.sw; }
  }
}
function saveCheckin(){
  const w=parseFloat(document.getElementById('w-inp').value);
  if(!w||w<30||w>300){toast('Введи корректный вес!');return;}
  const days=S.get('days',{}); const td=todayStr();
  if(!days[td])days[td]={};
  days[td].weight=w; days[td].workout=workout; days[td].rating=rating;
  S.set('days',days);
  const cfg=S.get('cfg',{}); cfg.currentWeight=w; S.set('cfg',cfg);
  toast('✅ Чек-ин сохранён!','ok'); renderHome();
}
 
// ── SLEEP ─────────────────────────────────────────────────────────
function sleepMins(s,e){
  const[sh,sm]=s.split(':').map(Number),[eh,em]=e.split(':').map(Number);
  let a=sh*60+sm,b=eh*60+em; if(b<=a)b+=1440; return b-a;
}
function sleepScore(hrs,w){
  const d=hrs>=7&&hrs<=9?50:hrs>=6.5?40:hrs>=6?28:hrs>=5?15:5;
  const ws=[50,38,26,16,10,5,0][Math.min(w,6)]; const t=d+ws;
  if(t>=85)return{t,lbl:'🌟 Отличный',c:'#16a34a',bg:'#f0fdf4',desc:'Идеальный сон!'};
  if(t>=70)return{t,lbl:'😴 Хороший',c:'#2563eb',bg:'#eff6ff',desc:'Хороший отдых.'};
  if(t>=50)return{t,lbl:'😐 Средний',c:'#d97706',bg:'#fffbeb',desc:'Влияет на прогресс.'};
  return{t,lbl:'😮 Плохой',c:'#dc2626',bg:'#fef2f2',desc:'Недосып мешает похудению!'};
}
function onSleep(){
  const s=document.getElementById('sl-start').value, e=document.getElementById('sl-end').value;
  if(!s||!e)return;
  const mins=sleepMins(s,e); const hrs=mins/60;
  const hh=Math.floor(hrs), mm=Math.round((hrs%1)*60);
  document.getElementById('sl-hrs').textContent=`${hh} ч ${mm} мин`;
  const pct=Math.min(100,(hrs/10)*100);
  const bar=document.getElementById('sl-pbar');
  bar.style.width=pct+'%';
  bar.style.background=hrs>=7&&hrs<=9?'var(--green)':hrs>=6?'var(--amber)':'var(--red)';
  const sc=sleepScore(hrs,wakeups);
  document.getElementById('sl-score').innerHTML=`
    <div class="sleep-score" style="background:${sc.bg};">
      <div class="score-emoji">${sc.lbl.split(' ')[0]}</div>
      <div style="flex:1;">
        <div class="score-val" style="color:${sc.c};">${sc.t}<span style="font-size:14px;">/100</span></div>
        <div class="score-lbl" style="color:${sc.c};">${sc.lbl}</div>
        <div class="score-desc">${sc.desc}</div>
      </div>
    </div>`;
}
function adjWU(d){ wakeups=Math.max(0,Math.min(10,wakeups+d)); document.getElementById('wu-num').textContent=wakeups; onSleep(); }
function saveSleep(){
  const s=document.getElementById('sl-start').value, e=document.getElementById('sl-end').value;
  if(!s||!e){toast('Введи время!');return;}
  const mins=sleepMins(s,e);
  if(mins<60){toast('Слишком мало — проверь время');return;}
  if(mins>1080){toast('Больше 18ч — проверь время');return;}
  const hrs=mins/60; const sc=sleepScore(hrs,wakeups);
  const slData=S.get('sleep',{}); const td=todayStr();
  slData[td]={start:s,end:e,wakeups,score:sc.t,hrs,saved:true,ts:Date.now()};
  S.set('sleep',slData);
  toast(`🌙 Сон сохранён! ${sc.t}/100 ${sc.lbl}`,'ok'); renderSlHist();
}
function renderSlHist(){
  const slData=S.get('sleep',{}); const now=nowIST();
  let html='';
  for(let i=0;i<7;i++){
    const d=new Date(now-i*86400000);
    const ds=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    const e=slData[ds];
    if(e?.saved){
      const sc=sleepScore(e.hrs,e.wakeups||0);
      const hh=Math.floor(e.hrs), mm=Math.round((e.hrs%1)*60);
      html+=`<div class="hist-item">
        <div class="hist-date">${dLabel(ds)}</div>
        <div style="flex:1;">
          <div style="display:flex;justify-content:space-between;font-size:12px;font-weight:700;margin-bottom:3px;">
            <span>${hh}ч ${mm}м · ${e.wakeups||0} пробуж.</span>
            <span style="color:${sc.c};">${sc.t}/100</span>
          </div>
          <div class="pbar-wrap" style="height:5px;margin:0;">
            <div class="pbar-fill" style="width:${Math.min(100,e.hrs/10*100)}%;background:${sc.c};"></div>
          </div>
        </div>
        <div style="font-size:10px;font-weight:700;padding:3px 7px;border-radius:7px;background:${sc.bg};color:${sc.c};white-space:nowrap;">${sc.lbl}</div>
      </div>`;
    } else if(i<3){
      html+=`<div class="hist-item"><div class="hist-date">${dLabel(ds)}</div><div style="font-size:12px;color:var(--muted);">Нет данных</div></div>`;
    }
  }
  document.getElementById('sl-hist').innerHTML=html||'<div style="color:var(--muted);font-size:13px;">Ещё нет записей</div>';
}
 
// ── CALENDAR ──────────────────────────────────────────────────────
function renderCal(){
  const dows=['Пн','Вт','Ср','Чт','Пт','Сб','Вс'];
  document.getElementById('cal-dows').innerHTML=dows.map(d=>`<div class="cal-dow">${d}</div>`).join('');
  const days=S.get('days',{}); const now=nowIST(); const td=todayStr();
  const grid=document.getElementById('cal-cells'); grid.innerHTML='';
  [{y:2026,m:3},{y:2026,m:4}].forEach(({y,m})=>{
    const first=new Date(y,m,1); let dow=first.getDay(); dow=dow===0?6:dow-1;
    for(let i=0;i<dow;i++){const d=document.createElement('div');grid.appendChild(d);}
    const dim=new Date(y,m+1,0).getDate();
    for(let d=1;d<=dim;d++){
      const dt=new Date(y,m,d);
      const ds=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const isGoal=y===2026&&m===4&&d===27;
      const isFuture=dt>now; const isToday=ds===td;
      const entry=days[ds];
      const cell=document.createElement('div');
      cell.className='cal-cell';
      if(isGoal){cell.classList.add('goal');cell.innerHTML=d+'<div class="cal-dot">🎯</div>';}
      else if(isFuture){cell.classList.add('future');cell.textContent=d;}
      else if(entry?.weight){cell.classList.add('has');cell.innerHTML=d+'<div class="cal-dot">✓</div>';}
      else{cell.classList.add('miss');cell.textContent=d;}
      if(isToday)cell.classList.add('today');
      grid.appendChild(cell);
    }
  });
}
function renderHist(){
  const days=S.get('days',{}); const sleep=S.get('sleep',{});
  const cfg=S.get('cfg',{}); const goal=cfg.stepsGoal||10000;
  const now=nowIST(); let html='';
  for(let i=0;i<7;i++){
    const d=new Date(now-i*86400000);
    const ds=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    const day=days[ds]||{}; const sl=sleep[ds]||{};
    html+=`<div class="hist-item">
      <div class="hist-date">${dLabel(ds)}</div>
      <div class="hist-tags">
        ${day.weight?`<span class="tag" style="background:#f0fdf4;color:var(--green);">⚖️${day.weight}кг</span>`:''}
        ${day.steps!=null?`<span class="tag" style="background:#eff6ff;color:var(--blue);">👟${Number(day.steps).toLocaleString('ru')}${day.steps>=goal?' ✅':''}</span>`:''}
        ${'workout'in day?`<span class="tag" style="background:${day.workout?'#f0fdf4':'#fef2f2'};color:${day.workout?'var(--green)':'var(--red)'};">💪${day.workout?'Да':'Нет'}</span>`:''}
        ${sl.saved?`<span class="tag" style="background:#f5f3ff;color:#7c3aed;">🌙${Math.floor(sl.hrs)}ч</span>`:''}
        ${!day.weight&&!('workout'in day)&&day.steps==null&&!sl.saved?'<span style="font-size:12px;color:var(--muted);">нет данных</span>':''}
      </div>
    </div>`;
  }
  document.getElementById('hist-list').innerHTML=html;
}
 
// ── TOAST ─────────────────────────────────────────────────────────
let _tt;
function toast(msg,type=''){
  const el=document.getElementById('toast');
  el.textContent=msg; el.className='toast show'+(type==='ok'?' ok':'');
  clearTimeout(_tt); _tt=setTimeout(()=>el.classList.remove('show'),2500);
}
</script>
</body>
